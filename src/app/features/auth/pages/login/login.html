<div class="login-container">
  <app-landing-header></app-landing-header>
  <main class="main">
    <app-landing-main></app-landing-main>
    <section class="login-section">
      <div class="login-card">
        <h2>Welcome Back!</h2>
        <p class="msg">Enter your email and password to continue</p>
        <form (submit)="onSubmit($event)">
          <label>
            Email :
            <input type="email" placeholder="Enter your email" [formField]="loginForm.email" />
          </label>
          <label>
            Password :
            <input
              type="password"
              placeholder="Enter your password here"
              [formField]="loginForm.password"
            />
          </label>
          <button type="submit">Login</button>
        </form>
        <p class="register-btn">Don't' have an account? <a routerLink="/register">Register</a></p>
      </div>
    </section>
  </main>
</div>
